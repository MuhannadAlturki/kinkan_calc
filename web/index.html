<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="حاسبة نقاط لعبة كنكنة">

  <!-- تلوين شريط حالة الجوال ليتماشى مع خلفية التطبيق بدل الأبيض الافتراضي -->
  <meta name="theme-color" content="#F7F7FA" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="كنكنة">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>كنكنة</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { height: 100%; margin: 0; background-color: #F7F7FA; }
    @media (prefers-color-scheme: dark) {
      html, body { background-color: #121212; }
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>

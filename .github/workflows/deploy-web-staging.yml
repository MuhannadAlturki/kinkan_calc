name: Deploy Web App (Staging)

on:
  push:
    branches: [claude/remote-control-phone-ungd3f]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: stable

      - run: flutter pub get
      - run: flutter build web --release --base-href /kinkan_calc/beta/ --pwa-strategy=none --dart-define=IS_STAGING=true

      - name: Deploy to GitHub Pages (beta subfolder)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          destination_dir: beta
          # لا نمسح باقي الموقع (نسخة الإنتاج) عند نشر البيئة التجريبية
          keep_files: true
